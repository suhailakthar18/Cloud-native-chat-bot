apiVersion: v1
kind: ServiceAccount
metadata:
  name: bot-sa

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bot-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bot-binding
subjects:
- kind: ServiceAccount
  name: bot-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: bot-role
  apiGroup: rbac.authorization.k8s.io
